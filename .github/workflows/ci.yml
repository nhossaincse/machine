name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          if [ -f pom.xml ]; then
            mvn -B package --fail-at-end
          else
            pom_file="$(find . -name pom.xml -not -path './.git/*' -print -quit)"
            if [ -z "$pom_file" ]; then
              echo "No pom.xml found"
              exit 1
            fi
            mvn -B -f "$pom_file" package --fail-at-end
          fi