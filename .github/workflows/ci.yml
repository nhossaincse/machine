name: CI
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: mvn -B -f "$(find "$GITHUB_WORKSPACE" -name pom.xml -not -path '*/target/*' | head -n 1)" package --fail-at-end