name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          pom_file="$(find . -name pom.xml -not -path './.git/*' -print -quit)"
          if [ -z "$pom_file" ]; then
            echo "No pom.xml found; skipping Maven build"
            exit 0
          fi
          cd "$(dirname "$pom_file")"
          mvn -B package --fail-at-end