name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          POM_FILE="$(find . -name pom.xml -not -path '*/target/*' | head -n 1)"
          if [ -z "$POM_FILE" ]; then
            echo "No pom.xml found"
            exit 1
          fi
          cd "$(dirname "$POM_FILE")"
          mvn -B package --fail-at-end