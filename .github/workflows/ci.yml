name: Java CI
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Build
        if: hashFiles('**/pom.xml') != ''
        run: mvn -B package --fail-at-end -f $(find . -name pom.xml | head -1)