name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          POM_FILE="$(find "$GITHUB_WORKSPACE" -name pom.xml -not -path '*/target/*' -print -quit)"
          if [ -z "$POM_FILE" ]; then
            echo "No pom.xml found; skipping Maven build."
            exit 0
          fi
          mvn -B -f "$POM_FILE" package --fail-at-end