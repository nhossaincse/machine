name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - run: |
          if [ -f pom.xml ]; then
            POM_FILE="pom.xml"
          else
            POM_FILE="$(find . -name pom.xml -not -path './.git/*' -print -quit)"
            if [ -z "$POM_FILE" ]; then
              echo "No pom.xml found in the repository. Skipping Maven build."
              exit 0
            fi
          fi
          mvn -B -f "$POM_FILE" package --fail-at-end